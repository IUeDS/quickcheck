version: 0.2

phases:
  install:
    commands:
      - yum -y install jq >/dev/null 2>&1 || true

  build:
    commands:
      - echo "Deploy starting..."
      - echo "Cluster: $CLUSTER_NAME"
      - echo "App: $APP_NAME  Env: $ENV_NAME  UseTagFilter: $USE_TAG_FILTER  DryRun: $DRY_RUN"

      - test -f image-detail.json
      - IMAGE_URI=$(cat image-detail.json | jq -r '.imageUri')
      - echo "New image: $IMAGE_URI"

      - SERVICE_ARNS=$(aws ecs list-services --cluster "$CLUSTER_NAME" --query "serviceArns[]" --output text)

      - |
        if [ -z "$SERVICE_ARNS" ]; then
          echo "No services found in cluster $CLUSTER_NAME"
          exit 0
        fi

      - UPDATED_SERVICES=""
      - |
        for SVC_ARN in $SERVICE_ARNS; do
          SVC_NAME=$(aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$SVC_ARN" --query "services[0].serviceName" --output text)
          echo "Considering service: $SVC_NAME"

          # Filter by tags (preferred) or by naming convention fallback
          if [ "$USE_TAG_FILTER" = "true" ]; then
            TAGS=$(aws ecs list-tags-for-resource --resource-arn "$SVC_ARN" --query "tags" --output json)
            HAS_APP=$(echo "$TAGS" | jq -r --arg A "$APP_NAME" 'map(select(.key=="App" and .value==$A)) | length')
            HAS_ENV=$(echo "$TAGS" | jq -r --arg E "$ENV_NAME" 'map(select(.key=="Env" and .value==$E)) | length')
            if [ "$HAS_APP" -eq 0 ] || [ "$HAS_ENV" -eq 0 ]; then
              echo "Skipping (tags do not match App/Env)"
              continue
            fi
          else
            case "$SVC_NAME" in
              *-"$APP_NAME"-"$ENV_NAME"-server|*-"$APP_NAME"-"$ENV_NAME"-artisan) ;;
              *) echo "Skipping (name does not match pattern)"; continue ;;
            esac
          fi

          TD_ARN=$(aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$SVC_ARN" --query "services[0].taskDefinition" --output text)
          echo "Current task def: $TD_ARN"

          if [ "$DRY_RUN" = "true" ]; then
            echo "DRY RUN: would register new task definition with image=$IMAGE_URI and update $SVC_NAME"
            UPDATED_SERVICES="$UPDATED_SERVICES $SVC_NAME"
            continue
          fi

          aws ecs describe-task-definition --task-definition "$TD_ARN" --query "taskDefinition" > td.json

          # Update all container images to the new image URI (your tasks are effectively single-container)
          cat td.json | jq --arg IMG "$IMAGE_URI" '
            .containerDefinitions |= (map(.image = $IMG)) |
            del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
          ' > td-new.json

          NEW_TD_ARN=$(aws ecs register-task-definition --cli-input-json file://td-new.json --query "taskDefinition.taskDefinitionArn" --output text)
          echo "New task def: $NEW_TD_ARN"

          aws ecs update-service --cluster "$CLUSTER_NAME" --service "$SVC_ARN" --task-definition "$NEW_TD_ARN" >/dev/null
          echo "Updated $SVC_NAME"

          UPDATED_SERVICES="$UPDATED_SERVICES $SVC_NAME"
        done

      - |
        if [ -z "$UPDATED_SERVICES" ]; then
          echo "No services matched filter; nothing to do."
          exit 0
        fi

      - echo "Services matched: $UPDATED_SERVICES"

      - |
        if [ "$DRY_RUN" = "true" ]; then
          echo "DRY RUN complete. No services were updated."
          exit 0
        fi

      # Wait for all updated services to stabilize (single group wait)
      - echo "Waiting for services to become stable..."
      - aws ecs wait services-stable --cluster "$CLUSTER_NAME" --services $UPDATED_SERVICES
      - echo "Deploy complete: all services stable."

artifacts:
  files:
    - image-detail.json