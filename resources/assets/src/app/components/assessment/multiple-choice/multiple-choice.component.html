<div class="qc-mc-options">
    <fieldset [attr.aria-labelledby]="'qc-assessment-question-' + currentQuestion.id">
        <div class="lead qc-assessment-question" [id]="'qc-assessment-question-' + currentQuestion.id" [innerHTML]="currentQuestion.question_text | safe: 'html'"></div>
        <legend class="sr-only">Multiple choice question</legend>
        <div class="form-check qc-assessment-multiple-choice-option" *ngFor="let answerOption of currentQuestion.options">
            <input type="radio" [name]="currentQuestion.id" class="form-check-input"
                    [value]="answerOption.answer_text"
                    [id]="answerOption.id"
                    [(ngModel)]="answerOption.selected"
                    (ngModelChange)="onAnswerSelected(answerOption)"
                    [attr.tabindex]="modalVisible ? -1 : 0">
            <label [innerHTML]="answerOption.answer_text | safe: 'html'" [for]="answerOption.id" class="form-check-label"></label>
        </div>
    </fieldset>
</div>
