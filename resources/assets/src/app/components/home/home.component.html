<div class="qc-home-page">
    <div class="row justify-content-center">
        <qc-error-message alertKey="homeError" [utilitiesService]="this.utilitiesService"></qc-error-message>
        <qc-error-message alertKey="sessionError" [utilitiesService]="this.utilitiesService"></qc-error-message>
    </div>
    <div class="row">
        <div class="col-12 col-sm-7 qc-home-hero">
            <button class="btn qc-hero-add-btn" (click)="this.addAssessment()" [hidden]="this.isAddingAssessment" type="button">Add Quick Check</button>
            <qc-quick-add *ngIf="this.isAddingAssessment"
                (onCancel)="this.cancelAdd($event)"
                [utilitiesService]="this.utilitiesService">
            </qc-quick-add>
        </div>
    </div>
</div>
