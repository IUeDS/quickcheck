version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws --version
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query "Account" --output text)
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      # Injected by CodeBuild env var (in CDK or console)
      - REPOSITORY_URI=$ECR_REPOSITORY_URI

      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - TIMESTAMP=$(date +%Y%m%d%H%M%S)
      - DEPLOY_TAG=${COMMIT_HASH}-${TIMESTAMP}

      - echo "Commit Hash: $COMMIT_HASH"
      - echo "Deploy Tag:  $DEPLOY_TAG"
      - echo "Repo URI:    $REPOSITORY_URI"

      # Copy secondary repo into the main repo's public folder.
      # This path depends on the CodePipeline artifact name for the second repo.
      - cp -r $CODEBUILD_SRC_DIR_ActivitiesOutput $CODEBUILD_SRC_DIR/public/customActivities

  build:
    commands:
      - echo Build started on `date`
      - touch .env
      - docker build -t $REPOSITORY_URI:$DEPLOY_TAG .

  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing Docker images...
      - docker push $REPOSITORY_URI:$DEPLOY_TAG

      # Optional traceability tag
      - docker tag $REPOSITORY_URI:$DEPLOY_TAG $REPOSITORY_URI:$COMMIT_HASH
      - docker push $REPOSITORY_URI:$COMMIT_HASH || echo "Tag $COMMIT_HASH already exists; skipping"

      # Single artifact describing the build output
      - printf '{"repositoryUri":"%s","deployTag":"%s","imageUri":"%s"}' "$REPOSITORY_URI" "$DEPLOY_TAG" "$REPOSITORY_URI:$DEPLOY_TAG" > image-detail.json
      - cat image-detail.json

artifacts:
  files:
    - image-detail.json